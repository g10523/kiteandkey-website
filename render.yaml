services:
  - type: web
    name: kite-academy-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://kite-academy-lms.vercel.app
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: AUTH_RATE_LIMIT_MAX
        value: "50"
      - key: LOCKOUT_THRESHOLD
        value: "5"
      - key: LOCKOUT_WINDOW_MS
        value: "900000"
      - key: ENABLE_AUDIT_LOGS
        value: "true"
      # Set these manually in the Render dashboard (sensitive):
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_SSL
        value: "true"